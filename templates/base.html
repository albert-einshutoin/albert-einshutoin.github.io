<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <meta name="author" content="{{ config.extra.author }}">

  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}{{ config.description }}{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
  <meta property="og:image" content="{{ config.base_url }}/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ config.base_url }}/og-image.png">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <script>
    (function(){var t=localStorage.getItem('theme');if(t){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches){document.documentElement.setAttribute('data-theme','light')}})();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">

  {% if config.generate_feeds %}
  {% if lang == "ja" %}
  <link rel="alternate" type="application/rss+xml" title="{{ config.title }}" href="{{ config.base_url }}/ja/rss.xml">
  {% else %}
  <link rel="alternate" type="application/rss+xml" title="{{ config.title }}" href="{{ get_url(path='rss.xml') }}">
  {% endif %}
  {% endif %}

  {% block head_extra %}{% endblock %}
</head>
<body>
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </svg>
  <div class="grain" aria-hidden="true"></div>

  <a href="#main-content" class="skip-link">Skip to content</a>

  {% include "partials/header.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <script>
    document.addEventListener('DOMContentLoaded',function(){
      if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
      var els=document.querySelectorAll('[data-animate]');
      if(!els.length)return;
      var obs=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){e.target.classList.add('is-visible');obs.unobserve(e.target)}
        });
      },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
      els.forEach(function(el){obs.observe(el)});
    });
  </script>
</body>
</html>
