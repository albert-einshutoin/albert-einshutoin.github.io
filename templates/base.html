<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <meta name="author" content="{{ config.extra.author }}">

  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}{{ config.description }}{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
  <meta property="og:image" content="{{ config.base_url }}/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ config.base_url }}/og-image.png">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">

  {% if config.generate_feeds %}
  {% if lang == "ja" %}
  <link rel="alternate" type="application/rss+xml" title="{{ config.title }}" href="{{ config.base_url }}/ja/rss.xml">
  {% else %}
  <link rel="alternate" type="application/rss+xml" title="{{ config.title }}" href="{{ get_url(path='rss.xml') }}">
  {% endif %}
  {% endif %}

  {% block head_extra %}{% endblock %}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  {% include "partials/header.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}
</body>
</html>
