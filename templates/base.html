<!DOCTYPE html>
<html lang="{% if lang == 'ja' %}ja{% else %}en-GB{% endif %}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <meta name="author" content="{{ config.extra.author }}">

  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}{{ config.description }}{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ current_url | default(value=config.base_url) }}">
  <meta property="og:image" content="{{ config.base_url }}/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ config.base_url }}/og-image.png">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <script>
    (function(){
      var m=localStorage.getItem('ui-mode');
      document.documentElement.setAttribute('data-ui-mode', (m==='folio'||m==='lab') ? m : 'lab');
      var t=localStorage.getItem('theme');
      if(t){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches){document.documentElement.setAttribute('data-theme','light')}
      if(document.documentElement.getAttribute('data-ui-mode')==='folio'&&window.matchMedia&&!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
        document.documentElement.classList.add('folio-typewriter-pending');
      }
    })();
  </script>
  <style>
    /* FOUC防止: タイプライター対象は JS が走るまで非表示（main.css より先に効かせる） */
    html.folio-typewriter-pending[data-ui-mode="folio"] .hero__eyebrow,
    html.folio-typewriter-pending[data-ui-mode="folio"] .hero .hero__title-line,
    html.folio-typewriter-pending[data-ui-mode="folio"] .hero__description,
    html.folio-typewriter-pending[data-ui-mode="folio"] .hero__secondary,
    html.folio-typewriter-pending[data-ui-mode="folio"] .detail-header > *,
    html.folio-typewriter-pending[data-ui-mode="folio"] .page-title > *,
    html.folio-typewriter-pending[data-ui-mode="folio"] .detail-body > *,
    html.folio-typewriter-pending[data-ui-mode="folio"] .about-content > *,
    html.folio-typewriter-pending[data-ui-mode="folio"] .philosophy__quote {
      opacity: 0 !important;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ get_url(path='main.css') }}">
  <script src="{{ get_url(path='js/folio-motion.js') }}" defer></script>

  {% if config.generate_feeds %}
  {% if lang == "ja" %}
  <link rel="alternate" type="application/rss+xml" title="{{ config.title }}" href="{{ config.base_url }}/ja/rss.xml">
  {% else %}
  <link rel="alternate" type="application/rss+xml" title="{{ config.title }}" href="{{ get_url(path='rss.xml') }}">
  {% endif %}
  {% endif %}

  {% block head_extra %}{% endblock %}
</head>
<body>
  <canvas class="network-bg" aria-hidden="true"></canvas>

  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </svg>
  <div class="grain" aria-hidden="true"></div>

  <a href="#main-content" class="skip-link">Skip to content</a>

  {% include "partials/header.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <script>
    document.addEventListener('DOMContentLoaded',function(){
      if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
      var els=document.querySelectorAll('[data-animate]');
      if(!els.length)return;
      var obs=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){e.target.classList.add('is-visible');obs.unobserve(e.target)}
        });
      },{threshold:0.1,rootMargin:'0px 0px -40px 0px'});
      els.forEach(function(el){obs.observe(el)});
    });
  </script>

  <script>
    document.addEventListener('click', function (e) {
      document.querySelectorAll('details.lang-dropdown[open]').forEach(function (d) {
        if (!d.contains(e.target)) d.removeAttribute('open');
      });
    });
  </script>

  <script>
  (function(){
    document.querySelectorAll('[data-ui-mode-set]').forEach(function(btn){
      function syncUiMode(){
        var mode=document.documentElement.getAttribute('data-ui-mode')||'lab';
        var on=btn.getAttribute('data-ui-mode-set')===mode;
        btn.classList.toggle('ui-mode-switch__item--active',on);
        btn.setAttribute('aria-pressed',on?'true':'false');
      }
      syncUiMode();
      btn.addEventListener('click',function(){
        var m=btn.getAttribute('data-ui-mode-set');
        if(m!=='lab'&&m!=='folio')return;
        if(m==='folio'&&window.matchMedia&&!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
          document.documentElement.classList.add('folio-typewriter-pending');
        }
        document.documentElement.setAttribute('data-ui-mode',m);
        try{localStorage.setItem('ui-mode',m)}catch(e){}
        document.querySelectorAll('[data-ui-mode-set]').forEach(function(b){
          var on=b.getAttribute('data-ui-mode-set')===m;
          b.classList.toggle('ui-mode-switch__item--active',on);
          b.setAttribute('aria-pressed',on?'true':'false');
        });
        if(window.initFolioMotion)window.initFolioMotion();
      });
    });
  })();
  </script>

  <script>
  (function(){
    if(document.documentElement.getAttribute('data-ui-mode')==='folio')return;
    var c=document.querySelector('.network-bg');
    if(!c)return;
    var ctx=c.getContext('2d');
    if(!ctx)return;
    var reducedMotion=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    var W,H,dpr=Math.min(window.devicePixelRatio||1,2);
    var scrollY=0,targetScroll=0;
    var PERSPECTIVE=550;
    var nodeCount,edgeDist,nodeMinR,nodeMaxR,edgeAlphaMax,nodeAlphaMax,lineW;
    var nodes=[],edges=[];

    function calcParams(){
      var area=W*H;
      if(W<=480){
        nodeCount=30;edgeDist=130;nodeMinR=1.0;nodeMaxR=2.8;
        edgeAlphaMax=0.28;nodeAlphaMax=0.7;lineW=0.8;
      }else if(W<=768){
        nodeCount=42;edgeDist=155;nodeMinR=1.0;nodeMaxR=2.5;
        edgeAlphaMax=0.26;nodeAlphaMax=0.65;lineW=0.75;
      }else if(W<=1200){
        nodeCount=60;edgeDist=180;nodeMinR=0.9;nodeMaxR=2.2;
        edgeAlphaMax=0.24;nodeAlphaMax=0.6;lineW=0.7;
      }else{
        nodeCount=80;edgeDist=200;nodeMinR=0.8;nodeMaxR=2.0;
        edgeAlphaMax=0.22;nodeAlphaMax=0.6;lineW=0.65;
      }
    }

    function resize(){
      W=window.innerWidth;H=window.innerHeight;
      c.width=W*dpr;c.height=H*dpr;
      c.style.width=W+'px';c.style.height=H+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      calcParams();
    }

    function initNodes(){
      nodes=[];edges=[];
      var spreadX=W*0.65,spreadY=H*0.65,spreadZ=Math.min(W,H)*0.4;
      for(var i=0;i<nodeCount;i++){
        nodes.push({
          x:(Math.random()-0.5)*spreadX,
          y:(Math.random()-0.5)*spreadY,
          z:(Math.random()-0.5)*spreadZ,
          vx:(Math.random()-0.5)*0.18,
          vy:(Math.random()-0.5)*0.18,
          vz:(Math.random()-0.5)*0.1,
          r:Math.random()*(nodeMaxR-nodeMinR)+nodeMinR
        });
      }
      buildEdges();
    }

    function buildEdges(){
      edges=[];
      for(var i=0;i<nodes.length;i++){
        for(var j=i+1;j<nodes.length;j++){
          var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,dz=nodes[i].z-nodes[j].z;
          var d=Math.sqrt(dx*dx+dy*dy+dz*dz);
          if(d<edgeDist)edges.push([i,j,d]);
        }
      }
    }

    function getThemeColors(){
      var s=getComputedStyle(document.documentElement);
      return{
        accent:s.getPropertyValue('--accent').trim()||'#4a9eff',
        muted:s.getPropertyValue('--text-muted').trim()||'#5a5d6e'
      };
    }

    function project(x,y,z,rotX,rotY){
      var cosA=Math.cos(rotY),sinA=Math.sin(rotY);
      var x1=x*cosA-z*sinA,z1=x*sinA+z*cosA;
      var cosB=Math.cos(rotX),sinB=Math.sin(rotX);
      var y1=y*cosB-z1*sinB,z2=y*sinB+z1*cosB;
      var scale=PERSPECTIVE/(PERSPECTIVE+z2);
      return{px:x1*scale+W/2,py:y1*scale+H/2,s:scale,z:z2};
    }

    var frameId,lastTime=0;
    function draw(time){
      frameId=requestAnimationFrame(draw);
      if(!lastTime)lastTime=time;
      var dt=Math.min((time-lastTime)/16.67,3);
      lastTime=time;

      scrollY+=(targetScroll-scrollY)*0.08;

      var cols=getThemeColors();
      ctx.clearRect(0,0,W,H);

      var rotY=scrollY*0.0003+time*0.00004;
      var rotX=scrollY*0.00015+Math.sin(time*0.00003)*0.15;

      if(!reducedMotion){
        var bx=W*0.45,by=H*0.45,bz=Math.min(W,H)*0.25;
        for(var i=0;i<nodes.length;i++){
          var n=nodes[i];
          n.x+=n.vx*dt;n.y+=n.vy*dt;n.z+=n.vz*dt;
          if(Math.abs(n.x)>bx)n.vx*=-1;
          if(Math.abs(n.y)>by)n.vy*=-1;
          if(Math.abs(n.z)>bz)n.vz*=-1;
        }
        if(Math.random()<0.025)buildEdges();
      }

      var projected=[];
      for(var i=0;i<nodes.length;i++){
        projected.push(project(nodes[i].x,nodes[i].y,nodes[i].z,rotX,rotY));
      }

      ctx.lineWidth=lineW;
      ctx.strokeStyle=cols.accent;
      for(var i=0;i<edges.length;i++){
        var e=edges[i],a=projected[e[0]],b=projected[e[1]];
        var avgZ=(a.z+b.z)/2;
        var alpha=Math.max(0,Math.min(edgeAlphaMax,(1-e[2]/edgeDist)*0.35*(PERSPECTIVE/(PERSPECTIVE+avgZ))));
        ctx.globalAlpha=alpha;
        ctx.beginPath();
        ctx.moveTo(a.px,a.py);
        ctx.lineTo(b.px,b.py);
        ctx.stroke();
      }

      ctx.fillStyle=cols.accent;
      for(var i=0;i<projected.length;i++){
        var p=projected[i],n=nodes[i];
        var alpha=Math.max(0.12,Math.min(nodeAlphaMax,p.s*0.6));
        ctx.globalAlpha=alpha;
        ctx.beginPath();
        ctx.arc(p.px,p.py,n.r*p.s*1.2,0,Math.PI*2);
        ctx.fill();
      }

      ctx.fillStyle=cols.muted;
      for(var i=0;i<projected.length;i++){
        var p=projected[i],n=nodes[i];
        if(n.r>nodeMaxR*0.7){
          ctx.globalAlpha=Math.max(0,Math.min(0.06,p.s*0.08));
          ctx.beginPath();
          ctx.arc(p.px,p.py,n.r*p.s*4,0,Math.PI*2);
          ctx.fill();
        }
      }

      ctx.globalAlpha=1;
    }

    function onScroll(){targetScroll=window.pageYOffset||document.documentElement.scrollTop}

    var resizeTimer;
    function onResize(){
      clearTimeout(resizeTimer);
      resizeTimer=setTimeout(function(){resize();initNodes()},150);
    }

    resize();initNodes();
    window.addEventListener('resize',onResize);
    window.addEventListener('scroll',onScroll,{passive:true});
    onScroll();
    frameId=requestAnimationFrame(draw);
  })();
  </script>
</body>
</html>
